name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish
        required: true
        type: string

permissions:
  contents: write

env:
  BIN_NAME: gitea-cli

jobs:
  build:
    name: release-build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          else
            rustup toolchain install stable --profile minimal
            rustup default stable
          fi

      - name: Install Rust toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
            .\rustup-init.exe -y --profile minimal --default-toolchain stable
            "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            rustup toolchain install stable --profile minimal
            rustup default stable
          }

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${BIN_NAME}" "dist/${BIN_NAME}"
          os_name="$(printf '%s' "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')"
          arch_name="$(printf '%s' "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')"
          archive_name="${BIN_NAME}-${os_name}-${arch_name}.tar.gz"
          tar -C dist -czf "dist/${archive_name}" "${BIN_NAME}"
          echo "archive_path=dist/${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/$env:BIN_NAME.exe" "dist/$env:BIN_NAME.exe"
          $archiveName = "$($env:BIN_NAME)-$($env:RUNNER_OS.ToLower())-$($env:RUNNER_ARCH.ToLower()).zip"
          Compress-Archive -Path "dist/$env:BIN_NAME.exe" -DestinationPath "dist/$archiveName" -Force
          "archive_path=dist/$archiveName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload packaged release asset (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: gitea-cli-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.package_unix.outputs.archive_path }}
          if-no-files-found: error

      - name: Upload packaged release asset (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: gitea-cli-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.package_windows.outputs.archive_path }}
          if-no-files-found: error

  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" --title "$TAG_NAME" --generate-notes --verify-tag
          fi
