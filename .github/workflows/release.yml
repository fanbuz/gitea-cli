name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish
        required: true
        type: string

permissions:
  contents: write

env:
  BIN_NAME: gitea-cli

jobs:
  build:
    name: release-build-${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: gitea-cli-linux-x64.tar.gz
            artifact_name: gitea-cli-linux-x64
            archive_format: tar.gz
            binary_name: gitea-cli
          - id: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            asset_name: gitea-cli-macos-arm64.tar.gz
            artifact_name: gitea-cli-macos-arm64
            archive_format: tar.gz
            binary_name: gitea-cli
          - id: macos-amd64
            os: macos-latest
            target: x86_64-apple-darwin
            asset_name: gitea-cli-macos-amd64.tar.gz
            artifact_name: gitea-cli-macos-amd64
            archive_format: tar.gz
            binary_name: gitea-cli
          - id: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: gitea-cli-windows-x64.zip
            artifact_name: gitea-cli-windows-x64
            archive_format: zip
            binary_name: gitea-cli.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          else
            rustup toolchain install stable --profile minimal
            rustup default stable
          fi
          rustup target add "${{ matrix.target }}"

      - name: Install Rust toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
            .\rustup-init.exe -y --profile minimal --default-toolchain stable
            "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            rustup toolchain install stable --profile minimal
            rustup default stable
          }
          rustup target add "${{ matrix.target }}"

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${BIN_NAME}"
          tar -C dist -czf "dist/${{ matrix.asset_name }}" "${BIN_NAME}"
          echo "archive_path=dist/${{ matrix.asset_name }}" >> "$GITHUB_OUTPUT"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" "dist/$env:BIN_NAME.exe"
          Compress-Archive -Path "dist/$env:BIN_NAME.exe" -DestinationPath "dist/${{ matrix.asset_name }}" -Force
          "archive_path=dist/${{ matrix.asset_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload packaged release asset (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.package_unix.outputs.archive_path }}
          if-no-files-found: error

      - name: Upload packaged release asset (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.package_windows.outputs.archive_path }}
          if-no-files-found: error

  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Download packaged assets
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber --repo "$GH_REPO"
          else
            gh release create "$TAG_NAME" "${files[@]}" --title "$TAG_NAME" --generate-notes --verify-tag --repo "$GH_REPO"
          fi
